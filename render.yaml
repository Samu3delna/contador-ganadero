services:
  # Web Service (API + Frontend serving)
  - type: web
    name: contador-ganadero-api
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: nvidia/nemotron-3-ultra-550b-a55b
      - key: FRONTEND_URL
        value: https://contador-ganadero.vercel.app
      - key: EMAIL_ENC_KEY
        sync: false

  # Background Worker (IMAP Listener 24/7 - NO spin down)
  - type: background
    name: contador-ganadero-imap-worker
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: EMAIL_ENC_KEY
        sync: false

  # Static Site (Frontend on Vercel - deploy separately)
  # This is just for reference, deploy frontend to Vercel